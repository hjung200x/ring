services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - ./deploy/ring.docker.env.example
    environment:
      DATABASE_URL: file:/app/apps/api/prisma/dev.db
      STORAGE_ROOT: /app/apps/api/storage
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/storage:/app/apps/api/storage
      - ./log:/app/log
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      - api
    restart: unless-stopped
